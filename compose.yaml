services:
  postgres:
    image: ghcr.io/postgresml/postgresml:2.10.0
    environment:
      - POSTGRES_DB=cats
      - POSTGRES_USER=adaptionuser
      - POSTGRES_PASSWORD=insecurepassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: