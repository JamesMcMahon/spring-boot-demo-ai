services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.pgml
    image: cats-postgres-pgml:latest
    environment:
      - POSTGRES_DB=cats
      - POSTGRES_USER=adaptionuser
      - POSTGRES_PASSWORD=insecurepassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
